<!DOCTYPE html>
<html lang="en">
<head>
  <title>Eva's corner</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <style>
    h1 {
      color: pink;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      text-align: center;
    }
    h2 {
      color: pink;
      font-family: 'Playfair Display', serif;
      text-align: center;
    }
    body {
      background-color: black;
    }
    p {
      color: white;
    }
    .discount {
      color: pink;
      text-align: center;
      font-weight: bold;
      cursor: pointer;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px;
    }
    .grid img {
      width: 100%;
    }
    .grid figure {
      overflow: hidden;
    }
    .grid img:hover {
      transform: scale(1.05);
      transition: transform 0.3s ease;
      cursor: pointer;
    }
    figcaption {
      color: pink;
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      padding: 8px 0;
      font-size: 18px;
    }
  </style>
</head>
<body>
    <h1>Eva's fashion corner</h1>
    <h2>Spring, Summer 2026</h2>
    <div class="grid">
        <figure>
            <a href="eva.html">
                <img src="eva.jpg" alt="Eva">
            </a>
            <figcaption>Eva — The Star</figcaption>
        </figure>
        <figure>
            <a href="dola.html">
                <img src="dola.jpg" alt="Dola">
            </a>
            <figcaption>Dola — The Organiser</figcaption>
        </figure>
        <figure>
            <a href="claude.html">
                <img src="claude.jpg" alt="Claude">
            </a>
            <figcaption>Claude — The Thinker</figcaption>
        </figure>
        <figure>
            <a href="chatgpt.html">
                <img src="chatgpt.jpg" alt="ChatGPT">
            </a>
            <figcaption>ChatGPT — The Enthusiast</figcaption>
        </figure>
    </div>
    <p>Welcome to Eva's fashion corner where you can shop for all your clothes in one place. We are an independent company that offers clothing styles that caters for every size and shape at affordable prices.</p>
    <p class="discount" onclick="alert('Use code EVA50 at checkout for 50% off your first order!')">50% OFF YOUR 1ST ORDER CLICK HERE</p>
</body>
</html>
